; PlatformIO Project Configuration File
; Compatible with Arduino IDE - both can edit the same source files
;
; Build: pio run
; Upload: pio run -t upload
; Upload LittleFS: pio run -t uploadfs
; Monitor: pio device monitor

[env:esp32-c6]
; Use Pioarduino fork with Arduino-ESP32 3.3.x (required by HomeSpan)
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.02/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino

; Match Arduino IDE build settings (min_spiffs partition scheme)
board_build.partitions = partitions.csv
board_build.filesystem = littlefs

; Monitor settings
monitor_speed = 115200

; Library dependencies
lib_deps =
    homespan/HomeSpan
    bblanchon/ArduinoJson
    links2004/WebSockets

; Build flags
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

; Extra scripts for LittleFS upload
board_build.flash_mode = dio

; Source file location - use the .ino file directly
; PlatformIO will compile .ino files in the root directory
